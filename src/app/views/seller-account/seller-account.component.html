<main>
  <div class="product-list">
    <h2>Product list</h2>
    <p class="success">{{ productMessage }}</p>
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Category</th>
          <th>Color</th>
          <th>Description</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td><img src="{{ product.image }}" /></td>
          <td>{{ product.name }}</td>
          <td>{{ product.price }}</td>
          <td>{{ product.category }}</td>
          <td>{{ product.color }}</td>
          <td>{{ product.description }}</td>
          <td>
            <button (click)="deleteProduct(product.id)">Delete</button>
            <button routerLink="/seller-update-product/{{ product.id }}">
              Edit
            </button>
          </td>
        </tr>
      </tbody>
      <tfoot></tfoot>
    </table>
  </div>
</main>
